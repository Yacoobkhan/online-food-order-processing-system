server.port=8081

# DataSource settings (placeholder)
spring.datasource.url=jdbc:mysql://localhost:3306/orderdb?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Prevent startup crash if MySQL is down
spring.datasource.hikari.initialization-fail-timeout=-1

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.activemq.broker-url=tcp://localhost:61616
spring.activemq.user=admin
spring.activemq.password=admin
camunda.bpm.webapp.enabled=true
camunda.bpm.webapp.index-redirect-enabled=true
camunda.bpm.admin-user.id=admin
camunda.bpm.admin-user.password=admin
payment.service.url=http://localhost:8082
kitchen.service.url=http://localhost:8083
delivery.service.url=http://localhost:8084
